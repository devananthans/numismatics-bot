name: Numismatics Bot Scheduler

on:
  schedule:
    # GitHub Actions cron is in UTC.
    # 9:00 AM IST = 3:30 AM UTC
    - cron: '30 3 * * *'
    # 6:00 PM IST = 12:30 PM UTC
    - cron: '30 12 * * *'
    # Sunday 10:00 AM IST = Sunday 4:30 AM UTC
    - cron: '30 4 * * 0'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit database updates

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine job type and run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}
        run: |
          # Check which cron triggered this run to execute the right job
          if [[ "${{ github.event.schedule }}" == "30 4 * * 0" ]]; then
            echo "Running weekly digest..."
            python main.py weekly
            echo "Running weekly cleanup..."
            python main.py cleanup
          else
            echo "Running daily job..."
            python main.py daily
          fi

      - name: Commit updated database
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add numismatics_bot.db
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Update database [skip ci]" && git push)
